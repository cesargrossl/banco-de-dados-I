version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: con_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_aula
      MYSQL_USER: aluno
      MYSQL_PASSWORD: aluno123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: